# Dependabot version updates. Docs:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Only ecosystems that actually exist in this repo: npm (root package.json,
# devDependencies only — the extension ships zero runtime deps) and the
# GitHub Actions used by CI. Updates are grouped into one weekly PR per
# ecosystem to keep churn low; a future runtime dependency would fall
# outside the dev-dependency group and get its own PR for closer review.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-dev-dependencies:
        dependency-type: "development"
    ignore:
      # @types/node tracks the VS Code extension-host runtime (Node 22 for the
      # supported engine range), NOT the newest Node. Newer types would let
      # code typecheck against APIs the host doesn't have. Bump the major here
      # deliberately when raising the minimum VS Code engine version.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
